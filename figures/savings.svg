  <g font-size="11" fill="#5a6664" text-anchor="end">
    <text x="52" y="124">100%</text><text x="52" y="194">75%</text><text x="52" y="264">50%</text><text x="52" y="334">25%</text><text x="52" y="404">0%</text>
  </g>
