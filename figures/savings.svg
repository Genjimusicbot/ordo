  <!-- Inbound logs 92 -> h=258 -->
  <rect x="528" y="142" width="96" height="258" rx="3" fill="#d9f64f"/>
  <text x="576" y="132" font-size="15" fill="#f4fcc4" text-anchor="middle" font-weight="700">92%</text>
