<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect x="0" y="0" width="860" height="460" rx="14" fill="#0a0c0d"/>
  <rect x="0.5" y="0.5" width="859" height="459" rx="14" fill="none" stroke="#1d2426" stroke-width="1"/>
  <!-- rune accent -->
